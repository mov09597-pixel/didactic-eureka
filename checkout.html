<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; }</style>
</head>
<body class="p-10">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 italic uppercase">بيانات الشحن</h1>
        <form id="checkoutForm" class="space-y-6">
            <input type="text" id="name" placeholder="الاسم بالكامل" class="w-full bg-zinc-900 border border-white/10 p-4 rounded" required>
            <input type="tel" id="phone" placeholder="رقم الموبايل" class="w-full bg-zinc-900 border border-white/10 p-4 rounded" required>
            <textarea id="address" placeholder="العنوان بالتفصيل" class="w-full bg-zinc-900 border border-white/10 p-4 rounded h-32" required></textarea>
            
            <div class="bg-zinc-900 p-6 rounded">
                <h2 class="font-bold mb-4">ملخص الطلب</h2>
                <div id="summary"></div>
            </div>

            <button type="submit" class="w-full bg-white text-black py-4 font-black uppercase text-xl">تأكيد الطلب الآن</button>
        </form>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('TITAN_CART')) || [];
        const summary = document.getElementById('summary');
        const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
        summary.innerHTML = `<p>إجمالي المنتجات: ${cart.length}</p><p class="text-2xl font-bold mt-2">الإجمالي: ${total} ج.م</p>`;

        document.getElementById('checkoutForm').onsubmit = async (e) => {
            e.preventDefault();
            const orderData = {
                customerName: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                items: cart,
                total: total
            };

            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            });

            if(response.ok) {
                alert('✅ تم استلام طلبك! سنتواصل معك هاتفياً.');
                localStorage.removeItem('TITAN_CART');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
